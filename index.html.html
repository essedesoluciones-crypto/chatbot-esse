  }
</style>
</head>

function avisoEntrega(t, d, docNombre){
  const porWA = /whatsapp|whats|ws|acá|aca|aquí|aqui|este|por acá|por aquí|por aqui/i.test(d.correo||'');
  const canal = porWA ? `directamente por este <strong>WhatsApp</strong>` : `al correo <strong>${d.correo}</strong>`;
  const costo = t.oficial > 0
    ? `Costo total: <strong>${fmt(t.oficial + t.gestion)}</strong> (oficial ${fmt(t.oficial)} + gestión Esse ${fmt(t.gestion)}).`
    : `Costo gestión Esse: <strong>${fmt(t.gestion)}</strong>.`;
  return `✅ ¡Perfecto! En un máximo de <strong>30 minutos</strong> le enviamos ${docNombre} ${canal}, salvo interrupciones en las plataformas oficiales.<br><br>${costo}`;
}

      2:'su documento laboral', 3:'su Acción de Tutela',
      4:'su Denuncia Penal', 5:'su Querella',
      6:'su Demanda de Pequeñas Causas', 7:'su Contrato de Prestación de Servicios'
    };
    flujoSimple(t,[
      {campo:'nombre',   pregunta:'¿Cuál es su <strong>nombre completo</strong>?'},
      {campo:'cedula',   pregunta:'¿Cuál es su <strong>número de cédula</strong>?'},
      {campo:'celular',  pregunta:'¿Cuál es su <strong>número de celular</strong>?'},
      {campo:'correo',   pregunta:'¿Cómo prefiere recibir su documento? Puede indicarnos un <strong>correo electrónico</strong> o recibirlo por este <strong>WhatsApp</strong>.'},
    ],
    d=>`📋 *${t.nombre}*\n• Nombre: ${d.nombre}\n• Cédula: ${d.cedula}\n• Celular: ${d.celular}\n• Entrega: ${d.correo}`,
    d=>avisoEntrega(t,d,docNombres[idx]||'el documento'));

  } else {
    // Flujo genérico — redirige a WhatsApp
    flujo = null;
    const msg = encodeURIComponent(`Hola, Esse De Soluciones. Deseo gestionar: *${t.nombre}*. ¿Me pueden orientar?`);
    addMsg('bot', `Con gusto le atendemos. Escríbanos por WhatsApp y un asesor le indicará los datos requeridos para <strong>${t.nombre}</strong>:<br><br>
      <a class="btn-accion verde" href="https://wa.me/${WA}?text=${msg}" target="_blank">📲 Escribir por WhatsApp</a>`);
    return;
  }
}

function siguientePaso(){
  if(!flujo) return;
  const paso = flujo.pasos[flujo.etapa];
  addMsg('bot', paso.pregunta);
}

function procesarFlujo(texto){
  if(!flujo) return false;
  const paso = flujo.pasos[flujo.etapa];
  flujo.datos[paso.campo] = texto;
  flujo.etapa++;

  if(flujo.etapa < flujo.pasos.length){
    siguientePaso();
  } else {
    const avisoHTML = typeof flujo.aviso === 'function' ? flujo.aviso(flujo.datos) : flujo.aviso;
    const resumen = flujo.confirmar(flujo.datos);
    const msgWA = encodeURIComponent(`${resumen}\n\nCosto total: ${fmt(flujo.tramite.oficial + flujo.tramite.gestion)}`);
    addMsg('bot', `${avisoHTML}<br><br>
      <a class="btn-accion verde" href="https://wa.me/${WA}?text=${msgWA}" target="_blank">📲 Confirmar y enviar solicitud</a>`);
    flujo = null;
  }
  return true;
}

function volver(){ flujo=null; addMsg('user','Volver al menú'); setTimeout(mostrarMenu,300); }

function irWA(tramite){
  addMsg('user','📲 Hablar con un asesor');
  const msg=encodeURIComponent(tramite?`Hola, Esse De Soluciones. Deseo gestionar: *${tramite}*.`:`Hola, Esse De Soluciones. Deseo hablar con un asesor.`);
  addMsg('bot',`Con gusto le conectamos con nuestro equipo:<br><br><a class="btn-accion verde" href="https://wa.me/${WA}?text=${msg}" target="_blank">📲 Abrir WhatsApp</a>`);
}

async function enviarAIA(texto){
  historial.push({role:'user',content:texto});
  showTyping();
  document.getElementById('send-btn').disabled=true;
  const q=texto.toLowerCase();
  const enc=indice.filter(t=>t.search.includes(q)||q.split(' ').some(w=>w.length>3&&t.search.includes(w))).slice(0,3);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,messages:historial})});
    const data=await r.json();
    const reply=data.content?.[0]?.text||'Disculpe, ocurrió un inconveniente. Por favor intente nuevamente.';
    historial.push({role:'assistant',content:reply});
    hideTyping();
    const html=reply.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
    const row=addMsg('bot',html);
    if(enc.length>0){
      const g=document.createElement('div'); g.className='options-grid'; g.style.marginTop='12px';
      enc.forEach(t=>{ const b=document.createElement('button'); b.className='opt-btn'; b.textContent=t.nombre; b.onclick=()=>verDetalle(t.cat,t.idx); g.appendChild(b); });
      const mb=document.createElement('button'); mb.className='opt-btn'; mb.textContent='📋 Ver todos los servicios'; mb.onclick=volver; g.appendChild(mb);
      row.querySelector('.bubble').appendChild(g);
    }
  }catch(e){
    hideTyping();
    addMsg('bot','Error de conexión. Por favor intente más tarde o contáctenos directamente:<br><br><a class="btn-accion verde" href="https://wa.me/'+WA+'" target="_blank">📲 Escribir por WhatsApp</a>');
  }finally{
    document.getElementById('send-btn').disabled=false;
  }
}

function enviarMensaje(){
  const t=inputEl.value.trim(); if(!t)return;
  inputEl.value=''; inputEl.style.height='auto';
  addMsg('user',t);
  if(procesarFlujo(t)) return;
  enviarAIA(t);
}
inputEl.addEventListener('input',()=>{ inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,100)+'px'; });
inputEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviarMensaje();} });

// Detectar Android y aplicar fix de barra inferior
if (/android/i.test(navigator.userAgent)) {
  document.querySelector('.input-area').classList.add('android-fix');
}

addMsg('bot','Bienvenido a <strong>Esse De Soluciones</strong>. Soy <strong>Esse</strong>, su asistente virtual para trámites gubernamentales.<br><br>Estoy aquí para orientarle de manera ágil y eficiente. ¿En qué le puedo servir hoy?');
setTimeout(mostrarMenu,700);
</script>
